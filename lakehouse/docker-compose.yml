version: "2"
services:
  # Hadoop Services
  namenode:
    image: apache/hadoop:3.4
    hostname: namenode
    command: ["hdfs", "namenode"]
    ports:
      - 9870:9870
    env_file:
      - config/hadoop/hadoop-defaults.conf
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-hadoop/dfs/name"
  datanode:
    image: apache/hadoop:3.4
    command: ["hdfs", "datanode"]
    env_file:
      - config/hadoop/hadoop-defaults.conf
  resourcemanager:
    image: apache/hadoop:3.4
    hostname: resourcemanager
    command: ["yarn", "resourcemanager"]
    ports:
        - 8088:8088
    env_file:
      - config/hadoop/hadoop-defaults.conf
    volumes:
      - ./test/hadoop/test.sh:/opt/test.sh
  nodemanager:
    image: apache/hadoop:3.4
    command: ["yarn", "nodemanager"]
    env_file:
      - config/hadoop/hadoop-defaults.conf
  # Spark Services
  spark-common: &spark-common
    build: ./config/spark
    volumes:
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - spark-logs:/opt/spark/spark-events
  spark-master:
    <<: *spark-common
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "7077:7077"     
      - "9090:8080"
  
  spark-history-server:
    <<: *spark-common
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    environment:
      - SPARK_MODE=history
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=/opt/spark/spark-events
    ports:
      - "18080:18080"
    depends_on:
      - spark-master

  spark-worker:
    <<: *spark-common
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8082
      - SPARK_WORKER_MEMORY=4g
      - SPARK_DAEMON_MEMORY=1g
    depends_on:
      - spark-master
    ports:
      - "8082:8082"
  # Trino Service
  trino:
    image: trinodb/trino:463   # JDK17
    container_name: trino
    user: root
    env_file:
      - .env
    environment:
      TRINO_ENVIRONMENT: ${TRINO_ENVIRONMENT:-production}
    ports:
      - "8087:8080"
    volumes:
      - ./config/trino/etc:/etc/trino:rw
      - trino-data:/data/trino:rw
      # - ./config/trino/hadoop:/etc/hadoop/conf:ro
    depends_on:
      - nodemanager
      - metastore
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  # Hive Metastore Service
  postgres-metastore:
    image: postgres:13
    container_name: postgres-metastore
    environment:
      POSTGRES_DB: ${HIVE_POSTGRES_DB:-metastore_db}
      POSTGRES_USER: ${HIVE_POSTGRES_USER:-hive}
      POSTGRES_PASSWORD: ${HIVE_POSTGRES_PASSWORD:-hive123}
    volumes:
      - postgres-metastore-volume:/var/lib/postgresql/data
    ports:
      - "5433:5432"            
    restart: always
  
  metastore:
    build: 
      context: ./config/hive-metastore
    hostname: metastore
    container_name: metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      DB_URL: jdbc:postgresql://postgres-metastore:5432/${HIVE_POSTGRES_DB:-metastore_db}
      DB_USER: ${HIVE_POSTGRES_USER:-hive}
      DB_PASS: ${HIVE_POSTGRES_PASSWORD:-hive123}
      METASTORE_DB_TYPE: postgres
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin12345}
      SERVICE_OPTS: >-
        -Xmx1G
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-metastore:5432/${HIVE_POSTGRES_DB:-metastore_db}
        -Djavax.jdo.option.ConnectionUserName=${HIVE_POSTGRES_USER:-hive}
        -Djavax.jdo.option.ConnectionPassword=${HIVE_POSTGRES_PASSWORD:-hive123}
        -Dmetastore.warehouse.dir=hdfs://namenode:8020/lakehouse
    depends_on:
      - postgres-metastore
      - nodemanager
    ports:
      - "9083:9083"
    restart: always
  #Jupyter Notebook Service
  jupyter-spark:
    image: quay.io/jupyter/pyspark-notebook:x86_64-spark-3.5.3
    volumes:
      - "spark-query:/home/jovyan"
    ports:
      - "8888:8888"

volumes:
  spark-logs:
  trino-data:
  postgres-metastore-volume:
  spark-query:
    

  